<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奧林帕斯之巔 - 收集型老虎機</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-screen" class="base-theme">
    <div class="collection-area">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <p>⚡ 能量收集: <span id="stat-collect">0</span> / 30</p>
    </div>

    <div id="reels-container" class="slot-machine">
        </div>

    <div id="message-display" class="message-box">
        準備好挑戰神界了嗎？
    </div>

    <div class="controls">
        <div class="stats">
            餘額: <span id="balance">10000</span> | 
            總投注: <span id="total-bet-display">100</span>
        </div>
        <div class="bet-settings">
            線數: <input type="number" id="line-input" value="20" min="1" max="20">
            單線押注: <input type="number" id="bet-input" value="5" min="1">
        </div>
        <button id="spin-btn">旋轉 SPIN</button>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
